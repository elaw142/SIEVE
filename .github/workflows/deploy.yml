name: Deploy

on:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: sieve-production
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Deploy on Oracle host
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          port: ${{ secrets.SSH_PORT || 22 }}
          script: |
            set -euo pipefail

            APP_DIR=/opt/sieve
            REPO_URL=https://github.com/elaw142/SIEVE.git

            if ! command -v git >/dev/null 2>&1; then
              sudo dnf install -y git
            fi

            if ! command -v docker >/dev/null 2>&1; then
              echo "Docker is not installed on the server." >&2
              exit 1
            fi

            if ! docker network inspect web >/dev/null 2>&1; then
              docker network create web
            fi

            sudo mkdir -p "$APP_DIR"
            sudo chown "$USER:$USER" "$APP_DIR"

            if [ ! -d "$APP_DIR/.git" ]; then
              if [ "$(find "$APP_DIR" -mindepth 1 -maxdepth 1 | wc -l)" -gt 0 ]; then
                BACKUP_DIR="${APP_DIR}.pre-git.$(date +%Y%m%d%H%M%S)"
                sudo mv "$APP_DIR" "$BACKUP_DIR"
                sudo mkdir -p "$APP_DIR"
                sudo chown "$USER:$USER" "$APP_DIR"
              fi
              git clone "$REPO_URL" "$APP_DIR"
              if [ -n "${BACKUP_DIR:-}" ] && [ -f "$BACKUP_DIR/.env" ]; then
                cp "$BACKUP_DIR/.env" "$APP_DIR/.env"
              fi
            fi

            cd "$APP_DIR"
            git fetch origin main
            git reset --hard origin/main

            if [ ! -f .env ]; then
              echo "Missing $APP_DIR/.env. Create it from .env.example with Spotify credentials." >&2
              exit 1
            fi

            docker compose up --build -d
