services:
  tracksieve-backend:
    build: ./backend
    container_name: tracksieve-backend
    environment:
      - SPOTIFY_CLIENT_ID=${SPOTIFY_CLIENT_ID}
      - SPOTIFY_CLIENT_SECRET=${SPOTIFY_CLIENT_SECRET}
      - SPOTIFY_REDIRECT_URI=${SPOTIFY_REDIRECT_URI}
      - FLASK_SECRET_KEY=${FLASK_SECRET_KEY}
      - AUTH_SUCCESS_REDIRECT=${AUTH_SUCCESS_REDIRECT:-/}
      - FRONTEND_ORIGIN=${FRONTEND_ORIGIN:-https://tracksieve.emlw.dev}
      - SESSION_COOKIE_SECURE=${SESSION_COOKIE_SECURE:-true}
      - SPOTIFY_TIMEOUT=${SPOTIFY_TIMEOUT:-12}
    networks:
      - web

  tracksieve-frontend:
    build: ./frontend
    container_name: tracksieve-frontend
    depends_on:
      - tracksieve-backend
    ports:
      - "127.0.0.1:${FRONTEND_PORT:-8094}:80"
    networks:
      - web

networks:
  web:
    external: true
